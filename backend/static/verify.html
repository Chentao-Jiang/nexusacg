<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>邮箱验证 - 次元链</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:48px 32px;text-align:center;box-shadow:0 25px 60px rgba(0,0,0,.3);max-width:420px;width:100%}
@media(max-width:480px){body{padding:16px}.card{padding:36px 24px;border-radius:20px}}
.logo{width:72px;height:72px;border-radius:16px;margin:0 auto 24px;display:block;object-fit:cover}
.badge{width:72px;height:72px;border-radius:16px;margin:0 auto 24px;background:linear-gradient(135deg,#6366F1,#4F46E5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:700}
.circle{width:72px;height:72px;border-radius:50%;margin:0 auto 24px;display:flex;align-items:center;justify-content:center}
.circle svg{width:36px;height:36px}
.g{background:linear-gradient(135deg,#10B981,#059669)}
.r{background:linear-gradient(135deg,#EF4444,#DC2626)}
.p{background:linear-gradient(135deg,#6366F1,#4F46E5)}
h1{font-size:24px;font-weight:700;color:#1F2937;margin-bottom:8px}
.desc{color:#6B7280;font-size:15px;line-height:1.6}
.btn{display:inline-block;margin-top:28px;padding:14px 48px;background:linear-gradient(135deg,#6366F1,#4F46E5);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;text-decoration:none;cursor:pointer}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;margin:0 auto}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card" id="card">
<img class="logo" src="/uploads/logo.jpeg" alt="" id="logo">
<div id="loading">
<div class="circle p"><div class="spin"></div></div>
<h1>验证中</h1>
<p class="desc">正在验证您的邮箱，请稍候</p>
</div>
<div id="success" style="display:none">
<div class="circle g"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
<h1>邮箱验证成功</h1>
<p class="desc" id="msg">欢迎加入次元链！</p>
<a class="btn" id="loginBtn" href="javascript:void(0)">去登录</a>
</div>
<div id="error" style="display:none">
<div class="circle r"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
<h1 id="etitle">验证失败</h1>
<p class="desc" id="emsg">验证链接无效或已过期</p>
<a class="btn" href="/">返回首页</a>
</div>
<div class="badge" id="fallback-logo" style="display:none">链</div>
</div>
<script>
(function(){
var token=new URLSearchParams(location.search).get('token');
if(!token){showError('验证失败','缺少验证参数');return}

var api=location.origin+'/api/v1/auth/email/verify-token?token='+encodeURIComponent(token);
fetch(api).then(function(r){return r.json()}).then(function(d){
if(d&&d.code===0&&d.data&&d.data.user){
var n=d.data.user.nickname||'';
showSuccess(n?n+'，欢迎加入次元链！':'欢迎加入次元链！');
}else{showError('链接失效',(d&&d.message)||'验证链接无效或已过期')}
}).catch(function(){showError('网络错误','无法连接服务器')});

function showSuccess(m){hide('loading');show('success');document.getElementById('msg').textContent=m;document.title='验证成功'}
function showError(t,m){hide('loading');show('error');document.getElementById('etitle').textContent=t;document.getElementById('emsg').textContent=m;document.title=t}
function show(id){document.getElementById(id).style.display='block'}
function hide(id){document.getElementById(id).style.display='none'}

// 手机端尝试唤起APP，电脑端跳转网页登录页
var btn=document.getElementById('loginBtn');
if(btn){
btn.onclick=function(){
if(/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)){
window.location.href='nexusacg://login';
setTimeout(function(){
window.location.href='/login';
},1500);
}else{
window.location.href='/login';
}
};
}
})();

document.getElementById('logo').onerror=function(){hide('logo');show('fallback-logo')};
</script>
</body>
</html>
