definitions:
  github_com_planforever_nexusacg_internal_service.CreateCategoryInput:
    properties:
      icon_url:
        type: string
      name:
        type: string
      parent_id:
        type: string
      sort_order:
        type: integer
      zone:
        type: string
    required:
    - name
    - zone
    type: object
  github_com_planforever_nexusacg_internal_service.UpdateCategoryInput:
    properties:
      icon_url:
        type: string
      name:
        type: string
      parent_id:
        type: string
      sort_order:
        type: integer
      zone:
        type: string
    type: object
  internal_handler.CreateCommentRequest:
    properties:
      content:
        maxLength: 2000
        type: string
      parent_id:
        type: string
    required:
    - content
    type: object
  internal_handler.CreateEventRequest:
    properties:
      address:
        type: string
      cover_url:
        type: string
      description:
        type: string
      end_time:
        type: string
      latitude:
        type: number
      longitude:
        type: number
      name:
        type: string
      start_time:
        type: string
    required:
    - address
    - end_time
    - name
    - start_time
    type: object
  internal_handler.CreateOrderRequest:
    properties:
      idempotency_key:
        type: string
      items:
        items:
          properties:
            product_id:
              type: string
            quantity:
              type: integer
          required:
          - product_id
          - quantity
          type: object
        minItems: 1
        type: array
    required:
    - items
    type: object
  internal_handler.CreatePostRequest:
    properties:
      content:
        maxLength: 10000
        type: string
      images:
        items:
          type: string
        maxItems: 20
        type: array
      tags:
        items:
          type: string
        maxItems: 10
        type: array
      title:
        maxLength: 200
        type: string
      video_url:
        type: string
    required:
    - content
    type: object
  internal_handler.CreateProductRequest:
    properties:
      anime_name:
        type: string
      category_id:
        type: string
      character_name:
        type: string
      description:
        maxLength: 5000
        type: string
      images:
        items:
          type: string
        maxItems: 20
        type: array
      name:
        maxLength: 200
        minLength: 1
        type: string
      original_price:
        type: number
      price:
        type: number
      source_type:
        enum:
        - official
        - agent
        - self_made
        type: string
      stock:
        maximum: 999999
        minimum: 0
        type: integer
      tags:
        items:
          type: string
        maxItems: 10
        type: array
      zone:
        enum:
        - cosplay
        - peripheral
        type: string
    required:
    - name
    - price
    - source_type
    - zone
    type: object
  internal_handler.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
      phone:
        type: string
    required:
    - password
    type: object
  internal_handler.PayRequest:
    properties:
      payment_id:
        type: string
      payment_method:
        enum:
        - wechat
        - alipay
        type: string
    required:
    - payment_id
    - payment_method
    type: object
  internal_handler.PrepayRequest:
    properties:
      amount:
        description: amount in cents (fen)
        type: integer
      description:
        type: string
      order_no:
        type: string
      payment_type:
        enum:
        - wechat
        - alipay
        type: string
    required:
    - amount
    - description
    - order_no
    - payment_type
    type: object
  internal_handler.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  internal_handler.RegisterRequest:
    properties:
      email:
        maxLength: 255
        type: string
      nickname:
        maxLength: 50
        minLength: 1
        type: string
      password:
        maxLength: 128
        minLength: 6
        type: string
      phone:
        maxLength: 20
        type: string
    required:
    - nickname
    - password
    type: object
  internal_handler.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
info:
