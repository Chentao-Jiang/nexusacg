version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: nexusacg-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - nexusacg-net

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: nexusacg-api
    expose:
      - "8080"
    env_file:
      - .env.production
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./keys:/app/keys:ro
    restart: unless-stopped
    networks:
      - nexusacg-net

  db:
    image: postgres:16-alpine
    container_name: nexusacg-db
    environment:
      POSTGRES_DB: nexusacg
      POSTGRES_USER: nexusacg
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexusacg_prod_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusacg -d nexusacg"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - nexusacg-net

  redis:
    image: redis:7-alpine
    container_name: nexusacg-redis
    command: redis-server --requirepass "${REDIS_PASSWORD:-redis_prod_pass}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nexusacg-net

volumes:
  postgres_data:
  redis_data:

networks:
  nexusacg-net:
    driver: bridge
