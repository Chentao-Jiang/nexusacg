name: nexusacg
description: 次元链 (NexusACG) - ACG线下产业生态服务平台
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.0
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  cached_network_image: ^3.3.1
  go_router: ^13.0.0
  shared_preferences: ^2.2.2
  json_annotation: ^4.8.1
  flutter_staggered_grid_view: ^0.7.0
  image_picker: ^1.0.7
  video_player: ^2.8.2
  url_launcher: ^6.2.4
  flutter_inappwebview: ^6.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.jpeg
